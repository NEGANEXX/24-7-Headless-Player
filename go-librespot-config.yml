device_name: SpotifyBot-24-7
device_type: computer
bitrate: 160
volume_steps: 100
initial_volume: 65535
log_level: info

# Pipe backend: no sound card needed on server
audio_backend: pipe
audio_device: ""

# go-librespot's built-in HTTP API
# Node.js app communicates via this port
server:
  enabled: true
  port: 3678
  allow_origin: "*"

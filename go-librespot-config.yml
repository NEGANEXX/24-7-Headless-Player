device_name: SpotifyBot-24-7
device_type: computer
bitrate: 160
volume_steps: 100
initial_volume: 65535
log_level: info

# Pipe backend: no sound card needed on server
audio_backend: pipe
audio_device: ""

# Store credentials here so login persists across restarts
credentials_path: /app/cache/credentials.json

# go-librespot's built-in HTTP API/server
# The Node.js app talks to this on port 3678
server:
  enabled: true
  port: 3678
  allow_origin: "*"

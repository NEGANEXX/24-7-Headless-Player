<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Let your artful melodies delight my ears.</title>
  <meta name="description" content="Search and queue songs to control what's playing right now.">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --green: #1DB954;
      --green-light: #1ed760;
      --green-dim: rgba(29, 185, 84, .15);
      --bg: #09090b;
      --card: rgba(12, 12, 14, .88);
      --card-hover: rgba(24, 24, 26, .92);
      --surface: rgba(255, 255, 255, .035);
      --border: rgba(255, 255, 255, .06);
      --border-hover: rgba(255, 255, 255, .12);
      --text: #e8e8e8;
      --text-dim: #999;
      --text-muted: #555;
      --danger: #ef4444;
      --radius: 16px;
      --radius-sm: 12px;
    }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased
    }

    /* Shader bg */
    #shader-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: .45
    }

    #shader-bg canvas {
      display: block;
      width: 100% !important;
      height: 100% !important
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: 16px 14px 32px;
      min-height: 100vh
    }

    /* Header */
    .header {
      text-align: center;
      padding: 20px 0 16px
    }

    .header-logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--green), var(--green-light));
      border-radius: 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      box-shadow: 0 4px 24px rgba(29, 185, 84, .35);
      animation: glow 3s ease-in-out infinite
    }

    @keyframes glow {

      0%,
      100% {
        box-shadow: 0 4px 24px rgba(29, 185, 84, .3)
      }

      50% {
        box-shadow: 0 4px 36px rgba(29, 185, 84, .55)
      }
    }

    .header-logo svg {
      width: 22px;
      height: 22px;
      fill: #fff
    }

    .header h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 22px;
      font-weight: 300;
      font-style: italic;
      color: rgba(255, 255, 255, .65);
      letter-spacing: .5px;
      line-height: 1.4;
      max-width: 340px;
      margin: 0 auto;
      min-height: 62px
    }

    .tw-cursor {
      display: inline-block;
      width: 1px;
      height: 1em;
      background: rgba(255, 255, 255, .5);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    .tagline {
      font-size: 11px;
      color: rgba(255, 255, 255, .3);
      margin-top: 2px;
      font-style: italic;
      letter-spacing: .3px
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 7px;
      padding: 3px 11px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      background: rgba(239, 68, 68, .1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, .2);
      transition: .4s ease
    }

    .badge.on {
      background: var(--green-dim);
      color: var(--green);
      border-color: rgba(29, 185, 84, .25)
    }

    .badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor
    }

    .badge.on .dot {
      animation: pulse 2s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    /* Now Playing */
    .np {
      background: var(--card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 10px;
      transition: .4s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .4)
    }

    .np.active {
      border-color: rgba(29, 185, 84, .15);
      box-shadow: 0 4px 30px rgba(29, 185, 84, .06)
    }

    .np-top {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .np-art {
      width: 68px;
      height: 68px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      overflow: hidden;
      flex-shrink: 0
    }

    .np-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity .3s
    }

    .np-art .ph {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333
    }

    .np-info {
      flex: 1;
      min-width: 0
    }

    .np-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--green);
      font-weight: 700;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 5px
    }

    .np-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .np-artist {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .prog {
      margin-top: 10px
    }

    .prog-bar {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, .08);
      border-radius: 2px;
      overflow: hidden
    }

    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--green-light));
      border-radius: 2px;
      transition: width 1s linear;
      width: 0%
    }

    .prog-times {
      display: flex;
      justify-content: space-between;
      margin-top: 3px;
      font-size: 9px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums
    }

    /* Equalizer */
    .eq {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
      flex-shrink: 0
    }

    .eq .b {
      width: 2.5px;
      background: var(--green);
      border-radius: 1.5px;
      animation: eqB .8s ease-in-out infinite
    }

    .eq .b:nth-child(1) {
      height: 6px;
      animation-delay: 0s
    }

    .eq .b:nth-child(2) {
      height: 11px;
      animation-delay: .1s
    }

    .eq .b:nth-child(3) {
      height: 8px;
      animation-delay: .2s
    }

    .eq .b:nth-child(4) {
      height: 13px;
      animation-delay: .3s
    }

    @keyframes eqB {

      0%,
      100% {
        transform: scaleY(.3)
      }

      50% {
        transform: scaleY(1)
      }
    }

    .eq.off .b {
      animation: none;
      transform: scaleY(.12);
      opacity: .3
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 12px 0
    }

    .ctrl-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--surface);
      color: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: .2s;
      font-size: 17px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      -webkit-tap-highlight-color: transparent
    }

    .ctrl-btn:hover {
      background: rgba(255, 255, 255, .1);
      color: #fff
    }

    .ctrl-btn:active {
      transform: scale(.9)
    }

    .ctrl-btn:disabled {
      opacity: .3;
      cursor: not-allowed;
      transform: none !important
    }

    .ctrl-btn.big {
      width: 50px;
      height: 50px;
      font-size: 20px
    }

    /* Volume */
    .vol {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 4px;
      margin-bottom: 14px
    }

    .vol-icon {
      color: var(--text-dim);
      flex-shrink: 0;
      cursor: pointer;
      transition: color .2s;
      -webkit-tap-highlight-color: transparent
    }

    .vol-icon:hover {
      color: var(--green)
    }

    .vol-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, .1);
      outline: none
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--green);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(29, 185, 84, .4)
    }

    .vol-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--green);
      cursor: pointer;
      border: none
    }

    .vol-pct {
      font-size: 11px;
      color: var(--text-muted);
      width: 32px;
      text-align: right;
      font-variant-numeric: tabular-nums
    }

    /* Search */
    .search-section {
      margin-bottom: 12px
    }

    .search-box {
      position: relative
    }

    .search-box input {
      width: 100%;
      padding: 12px 14px 12px 40px;
      background: var(--card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: #fff;
      outline: none;
      transition: .3s;
      -webkit-tap-highlight-color: transparent
    }

    .search-box input::placeholder {
      color: var(--text-muted)
    }

    .search-box input:focus {
      border-color: rgba(29, 185, 84, .4);
      box-shadow: 0 0 0 3px rgba(29, 185, 84, .08)
    }

    .s-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      transition: color .3s
    }

    .search-box input:focus~.s-icon {
      color: var(--green)
    }

    /* Results */
    .results {
      margin-top: 8px
    }

    .r-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      background: var(--card);
      border: 1px solid var(--border);
      margin-bottom: 5px;
      transition: .2s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px)
    }

    .r-item:hover {
      background: var(--card-hover);
      border-color: var(--border-hover)
    }

    .r-art {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
      flex-shrink: 0
    }

    .r-art img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .r-info {
      flex: 1;
      min-width: 0
    }

    .r-name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .r-artist {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .r-dur {
      font-size: 10px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0
    }

    .btn-add {
      padding: 7px 12px;
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(29, 185, 84, .25);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: .2s;
      flex-shrink: 0;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent
    }

    .btn-add:hover {
      background: rgba(29, 185, 84, .25)
    }

    .btn-add:disabled {
      opacity: .4;
      cursor: not-allowed
    }

    .btn-add.done {
      background: rgba(29, 185, 84, .06);
      color: var(--text-muted);
      border-color: var(--border);
      cursor: default
    }

    /* Queue */
    .q-section {
      margin-bottom: 12px
    }

    .sec-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 700;
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .sec-title .cnt {
      background: var(--surface);
      padding: 2px 7px;
      border-radius: 8px;
      font-size: 10px;
      color: var(--text-dim)
    }

    .q-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, .02);
      margin-bottom: 4px;
      transition: .2s
    }

    .q-item:hover {
      background: rgba(255, 255, 255, .04)
    }

    .q-num {
      width: 18px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      flex-shrink: 0
    }

    .q-art {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--surface)
    }

    .q-art img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .q-info {
      flex: 1;
      min-width: 0
    }

    .q-name {
      font-size: 12px;
      font-weight: 500;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .q-artist {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    /* Login */
    .login-card {
      text-align: center;
      padding: 32px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      margin-bottom: 14px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px)
    }

    .login-card h2 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 5px
    }

    .login-card p {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 16px;
      line-height: 1.5
    }

    .btn-login {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--green), var(--green-light));
      color: #000;
      transition: .2s;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(29, 185, 84, .4)
    }

    .empty {
      text-align: center;
      padding: 20px 16px;
      color: var(--text-muted);
      font-size: 13px
    }

    .empty .em {
      font-size: 24px;
      margin-bottom: 5px
    }

    .footer {
      text-align: center;
      margin-top: 12px;
      padding: 10px;
      font-size: 9px;
      color: rgba(255, 255, 255, .15)
    }

    /* Live indicator */
    .live-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 4px;
      animation: livePulse 1.5s ease-in-out infinite
    }

    .live-dot.on {
      background: var(--green)
    }

    @keyframes livePulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 10px 22px;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      z-index: 100;
      opacity: 0;
      transition: .4s cubic-bezier(.16, 1, .3, 1);
      pointer-events: none;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px)
    }

    .toast.ok {
      background: rgba(29, 185, 84, .9)
    }

    .toast.err {
      background: rgba(239, 68, 68, .9)
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0)
    }

    .hidden {
      display: none !important
    }

    /* Mobile */
    @media(max-width:480px) {
      .app {
        padding: 10px 10px 24px
      }

      .header {
        padding: 14px 0 12px
      }

      .header h1 {
        font-size: 20px
      }

      .np {
        padding: 12px;
        border-radius: 16px
      }

      .np-art {
        width: 56px;
        height: 56px;
        border-radius: 10px
      }

      .np-name {
        font-size: 13px
      }

      .controls {
        gap: 10px;
        margin: 10px 0
      }

      .ctrl-btn {
        width: 40px;
        height: 40px;
        font-size: 15px
      }

      .ctrl-btn.big {
        width: 46px;
        height: 46px;
        font-size: 18px
      }

      .r-art {
        width: 40px;
        height: 40px
      }

      .search-box input {
        font-size: 16px;
        padding: 11px 12px 11px 38px
      }

      .vol {
        gap: 8px
      }
    }

    @media(max-width:360px) {
      .np-art {
        width: 48px;
        height: 48px
      }

      .r-art {
        width: 36px;
        height: 36px
      }

      .r-dur {
        display: none
      }
    }
  </style>
</head>

<body>
  <div id="shader-bg"></div>

  <div class="app">
    <header class="header">
      <div class="header-logo">
        <svg viewBox="0 0 24 24">
          <path
            d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z" />
        </svg>
      </div>
      <h1><span id="typewriter"></span><span class="tw-cursor"></span></h1>
      <div id="badge" class="badge"><span class="dot"></span><span id="badge-text">Connecting...</span></div>
    </header>

    <div id="np" class="np">
      <div class="np-top">
        <div class="np-art">
          <div id="art-ph" class="ph"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
            </svg></div>
          <img id="art-img" class="hidden" src="" alt="">
        </div>
        <div class="np-info">
          <div class="np-label">
            <div id="eq" class="eq off">
              <div class="b"></div>
              <div class="b"></div>
              <div class="b"></div>
              <div class="b"></div>
            </div>
            <span id="np-tag">NOT PLAYING</span>
          </div>
          <div class="np-name" id="np-name">Waiting for a track...</div>
          <div class="np-artist" id="np-artist">—</div>
        </div>
      </div>
      <div id="prog" class="prog hidden">
        <div class="prog-bar">
          <div class="prog-fill" id="prog-fill"></div>
        </div>
        <div class="prog-times"><span id="t-cur">0:00</span><span id="t-tot">0:00</span></div>
      </div>
    </div>

    <div id="controls" class="controls hidden">
      <button class="ctrl-btn" id="prev-btn" onclick="prevTrack()" title="Previous">⏮</button>
      <button class="ctrl-btn big" id="play-btn" onclick="togglePlayback()" title="Play/Pause">▶</button>
      <button class="ctrl-btn" id="skip-btn" onclick="skipTrack()" title="Skip">⏭</button>
    </div>

    <div id="vol-section" class="vol hidden">
      <svg class="vol-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" onclick="toggleMute()">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path id="vw1" d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        <path id="vw2" d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
      </svg>
      <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="50">
      <span class="vol-pct" id="vol-pct">50%</span>
    </div>

    <div id="login-card" class="login-card hidden">
      <h2>🔒 Owner Setup</h2>
      <p>The DJ hasn't connected their Spotify yet.<br>If you're the owner, log in to get started.</p>
      <a href="/login" class="btn-login">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z" />
        </svg>
        Login with Spotify
      </a>
    </div>

    <div id="search-section" class="search-section hidden">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search for a song..." autocomplete="off" spellcheck="false">
        <svg class="s-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
      <div id="results" class="results"></div>
    </div>

    <div id="q-section" class="q-section hidden">
      <div class="sec-title"><span>Up Next</span><span class="cnt" id="q-cnt">0</span></div>
      <div id="q-list"></div>
    </div>

    <div id="empty" class="empty hidden">
      <div class="em">🎧</div>
      <div>Search for a song to get started!</div>
    </div>
    <footer class="footer"><span class="live-dot" id="live-dot"></span> <span id="live-text">Connecting...</span>
    </footer>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // ── Shader Background ───────────────────────────────
    (function () {
      const c = document.getElementById('shader-bg');
      const vs = `void main(){gl_Position=vec4(position,1.0);}`;
      const fs = `precision highp float;uniform vec2 resolution;uniform float time;
      void main(){vec2 uv=(gl_FragCoord.xy*2.0-resolution.xy)/min(resolution.x,resolution.y);
      float t=time*0.05;float lw=0.002;vec3 col=vec3(0.0);
      for(int j=0;j<3;j++){for(int i=0;i<5;i++){col[j]+=lw*float(i*i)/abs(fract(t-0.01*float(j)+float(i)*0.01)*5.0-length(uv)+mod(uv.x+uv.y,0.2));}}
      gl_FragColor=vec4(col,1.0);}`;
      const cam = new THREE.Camera(); cam.position.z = 1;
      const sc = new THREE.Scene(), geo = new THREE.PlaneGeometry(2, 2);
      const u = { time: { type: 'f', value: 1.0 }, resolution: { type: 'v2', value: new THREE.Vector2() } };
      sc.add(new THREE.Mesh(geo, new THREE.ShaderMaterial({ uniforms: u, vertexShader: vs, fragmentShader: fs })));
      const r = new THREE.WebGLRenderer({ antialias: false }); r.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); c.appendChild(r.domElement);
      function resize() { r.setSize(window.innerWidth, window.innerHeight); u.resolution.value.set(r.domElement.width, r.domElement.height); }
      resize(); window.addEventListener('resize', resize);
      (function anim() { requestAnimationFrame(anim); u.time.value += 0.05; r.render(sc, cam); })();
    })();

    // ── App State ───────────────────────────────────────
    let queued = new Set(), searchTO = null, volTO = null, prevVol = 50, isMuted = false;

    // ── SSE: Live Connection ────────────────────────────
    let evtSource = null;
    function connectSSE() {
      if (evtSource) evtSource.close();
      evtSource = new EventSource('/api/live');
      evtSource.onmessage = e => {
        try { const d = JSON.parse(e.data); if (d.authenticated !== undefined) render(d); setLive(true); } catch (er) { }
      };
      evtSource.onerror = () => { setLive(false); setTimeout(() => { if (evtSource) evtSource.close(); connectSSE(); }, 3000); };
      evtSource.onopen = () => setLive(true);
    }
    function setLive(on) {
      document.getElementById('live-dot').classList.toggle('on', on);
      document.getElementById('live-text').textContent = on ? 'Live' : 'Reconnecting...';
    }

    // Fallback: initial fetch, then SSE takes over
    fetch('/api/status').then(r => r.json()).then(render).catch(() => { });
    connectSSE();

    // ── Search ──────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', e => {
      clearTimeout(searchTO); const q = e.target.value.trim();
      if (q.length < 2) { document.getElementById('results').innerHTML = ''; return; }
      searchTO = setTimeout(() => search(q), 300);
    });

    // ── Volume Slider ───────────────────────────────────
    const vSlider = document.getElementById('vol-slider');
    vSlider.addEventListener('input', e => {
      const v = parseInt(e.target.value);
      document.getElementById('vol-pct').textContent = v + '%'; volIcon(v);
      clearTimeout(volTO); volTO = setTimeout(() => setVol(v), 200);
    });

    // ── Render ──────────────────────────────────────────
    function render(d) {
      const badge = document.getElementById('badge'), bt = document.getElementById('badge-text');
      if (d.authenticated) {
        badge.classList.add('on'); bt.textContent = 'Spotify Connected';
        hide('login-card'); show('search-section'); show('controls'); show('vol-section');
      } else {
        badge.classList.remove('on'); bt.textContent = 'Not Connected';
        show('login-card'); hide('search-section'); hide('controls'); hide('vol-section');
      }

      const np = document.getElementById('np'), eq = document.getElementById('eq'), tag = document.getElementById('np-tag');
      if (d.playing && d.currentTrack) {
        np.classList.add('active'); eq.classList.remove('off'); tag.textContent = 'NOW PLAYING';
        document.getElementById('play-btn').textContent = '⏸';
        isPlaying = true;
        document.getElementById('np-name').textContent = d.currentTrack.name;
        document.getElementById('np-artist').textContent = d.currentTrack.artist;
        if (d.currentTrack.albumArt) { const img = document.getElementById('art-img'); if (img.src !== d.currentTrack.albumArt) img.src = d.currentTrack.albumArt; img.classList.remove('hidden'); document.getElementById('art-ph').classList.add('hidden'); }
        if (d.currentTrack.progress && d.currentTrack.duration) { show('prog'); document.getElementById('prog-fill').style.width = (d.currentTrack.progress / d.currentTrack.duration * 100) + '%'; document.getElementById('t-cur').textContent = fmt(d.currentTrack.progress); document.getElementById('t-tot').textContent = fmt(d.currentTrack.duration); }
        hide('empty');
      } else {
        np.classList.remove('active'); eq.classList.add('off');
        tag.textContent = d.authenticated ? 'PAUSED' : 'NOT PLAYING';
        document.getElementById('play-btn').textContent = '▶';
        isPlaying = false;
        document.getElementById('np-name').textContent = d.authenticated ? 'Nothing playing' : 'Waiting for DJ...';
        document.getElementById('np-artist').textContent = '—';
        document.getElementById('art-img').classList.add('hidden'); document.getElementById('art-ph').classList.remove('hidden');
        hide('prog');
        if (d.authenticated && (!d.queue || !d.queue.length)) show('empty');
      }

      // Volume — only update if user isn't dragging
      if (d.volume != null && document.activeElement?.id !== 'vol-slider') {
        vSlider.value = d.volume; document.getElementById('vol-pct').textContent = d.volume + '%'; volIcon(d.volume);
      }

      // Queue
      if (d.queue && d.queue.length > 0) {
        show('q-section'); hide('empty');
        document.getElementById('q-cnt').textContent = d.queue.length;
        document.getElementById('q-list').innerHTML = d.queue.map((it, i) =>
          `<div class="q-item"><span class="q-num">${i + 1}</span><div class="q-art">${it.albumArt ? `<img src="${esc(it.albumArt)}">` : ''}</div><div class="q-info"><div class="q-name">${esc(it.name)}</div><div class="q-artist">${esc(it.artist)}</div></div></div>`
        ).join('');
      } else hide('q-section');
    }

    // ── Actions ─────────────────────────────────────────
    async function search(q) {
      try {
        const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        if (r.status === 429) { toast('Slow down!', 'err'); return; }
        const d = await r.json(), c = document.getElementById('results');
        if (!d.results || !d.results.length) { c.innerHTML = '<div class="empty">No results</div>'; return; }
        c.innerHTML = d.results.map(t => { const done = queued.has(t.uri); return `<div class="r-item"><div class="r-art">${t.albumArt ? `<img src="${esc(t.albumArt)}">` : ''}</div><div class="r-info"><div class="r-name">${esc(t.name)}</div><div class="r-artist">${esc(t.artist)}</div></div><span class="r-dur">${fmt(t.duration)}</span><button class="btn-add ${done ? 'done' : ''}" id="a-${t.uri.replace(/:/g, '-')}" onclick="addQ('${esc(t.uri)}','${ej(t.name)}','${ej(t.artist)}','${esc(t.albumArt || '')}')" ${done ? 'disabled' : ''}>${done ? '✓ Added' : '+ Queue'}</button></div>`; }).join('');
      } catch (e) { console.error(e); }
    }

    async function addQ(uri, name, artist, art) {
      const id = `a-${uri.replace(/:/g, '-')}`, btn = document.getElementById(id);
      if (btn) { btn.disabled = true; btn.textContent = '...'; }
      try {
        const r = await fetch('/api/queue', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ trackUri: uri, name, artist, albumArt: art }) });
        if (r.status === 429) { toast('Slow down!', 'err'); if (btn) { btn.disabled = false; btn.textContent = '+ Queue'; } return; }
        const d = await r.json();
        if (d.success) { queued.add(uri); if (btn) { btn.classList.add('done'); btn.textContent = '✓ Added'; } toast(`Queued: ${name}`, 'ok'); }
        else { toast(d.error || 'Failed', 'err'); if (btn) { btn.disabled = false; btn.textContent = '+ Queue'; } }
      } catch (e) { toast('Error', 'err'); if (btn) { btn.disabled = false; btn.textContent = '+ Queue'; } }
    }

    async function skipTrack() {
      const btn = document.getElementById('skip-btn'); btn.disabled = true;
      try { const r = await fetch('/api/skip', { method: 'POST' }); const d = await r.json(); if (r.status === 429) toast('Wait', 'err'); else if (d.success) toast('Skipped!', 'ok'); else toast(d.error || 'Failed', 'err'); } catch (e) { toast('Error', 'err'); }
      setTimeout(() => btn.disabled = false, 1500);
    }

    async function prevTrack() {
      const btn = document.getElementById('prev-btn'); btn.disabled = true;
      try { const r = await fetch('/api/previous', { method: 'POST' }); const d = await r.json(); if (r.status === 429) toast('Wait', 'err'); else if (d.success) toast('Previous', 'ok'); else toast(d.error || 'Failed', 'err'); } catch (e) { toast('Error', 'err'); }
      setTimeout(() => btn.disabled = false, 1500);
    }

    let isPlaying = false;
    async function togglePlayback() {
      const btn = document.getElementById('play-btn'); btn.disabled = true;
      const action = isPlaying ? 'pause' : 'play';
      try {
        const r = await fetch('/api/playback', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action }) });
        const d = await r.json();
        if (r.status === 429) toast('Wait', 'err');
        else if (d.success) { isPlaying = !isPlaying; btn.textContent = isPlaying ? '⏸' : '▶'; toast(isPlaying ? 'Playing' : 'Paused', 'ok'); }
        else toast(d.error || 'Failed', 'err');
      } catch (e) { toast('Error', 'err'); }
      setTimeout(() => btn.disabled = false, 1000);
    }

    async function setVol(v) { try { await fetch('/api/volume', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ volume: v }) }); } catch (e) { } }

    function toggleMute() {
      if (isMuted) { vSlider.value = prevVol; document.getElementById('vol-pct').textContent = prevVol + '%'; volIcon(prevVol); setVol(prevVol); isMuted = false; }
      else { prevVol = parseInt(vSlider.value); vSlider.value = 0; document.getElementById('vol-pct').textContent = '0%'; volIcon(0); setVol(0); isMuted = true; }
    }

    // ── Helpers ──────────────────────────────────────────
    function volIcon(v) { document.getElementById('vw1').style.display = v > 0 ? '' : 'none'; document.getElementById('vw2').style.display = v > 50 ? '' : 'none'; }
    function fmt(ms) { if (!ms) return '0:00'; return Math.floor(ms / 60000) + ':' + Math.floor((ms % 60000) / 1000).toString().padStart(2, '0'); }
    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function ej(s) { if (!s) return ''; return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"'); }
    function show(id) { document.getElementById(id).classList.remove('hidden'); }
    function hide(id) { document.getElementById(id).classList.add('hidden'); }
    let tT; function toast(m, ty = 'ok') { const t = document.getElementById('toast'); t.textContent = m; t.className = `toast ${ty}`; clearTimeout(tT); void t.offsetWidth; t.classList.add('show'); tT = setTimeout(() => t.classList.remove('show'), 2500); }

    // ── Typewriter ───────────────────────────────────────
    (function typewriter() {
      const words = [
        'Let your artful melodies delight my ears.',
        'Where rhythm meets soul, magic unfolds.',
        'Every note tells a story untold.',
        'Music is the language of the heart.',
        'Feel the beat, let the rhythm speak.'
      ];
      const el = document.getElementById('typewriter');
      let wi = 0, ci = 0, deleting = false;
      function tick() {
        const w = words[wi];
        if (!deleting) {
          if (ci < w.length) { ci++; el.textContent = w.substring(0, ci); setTimeout(tick, 80); }
          else setTimeout(() => { deleting = true; tick(); }, 2500);
        } else {
          if (ci > 0) { ci--; el.textContent = w.substring(0, ci); setTimeout(tick, 40); }
          else { deleting = false; wi = (wi + 1) % words.length; setTimeout(tick, 400); }
        }
      }
      tick();
    })();
  </script>
</body>

</html>
